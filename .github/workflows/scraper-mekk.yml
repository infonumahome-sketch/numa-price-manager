name: Scraper MEKK -> Panel Numa

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Restaurar cookies de sesión
        env:
          COOKIES_JSON: ${{ secrets.MEKK_COOKIES_JSON }}
        run: |
          mkdir -p scraper/mekk_output
          echo "$COOKIES_JSON" > scraper/cookies.json
          echo "✅ Cookies restauradas"

      - name: Correr scraper
        working-directory: scraper
        env:
          PANEL_API_URL: ${{ secrets.PANEL_API_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: python mekk_scraper_v4.py

      - name: Subir JSON generado (para debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalogo-mekk
          path: scraper/mekk_output/catalogo_mekk.json
          retention-days: 14
