name: Scraper MEKK -> Panel Numa

on:
  # Corre todos los lunes a las 9:00 (hora Argentina, UTC-3 -> 12:00 UTC)
  schedule:
    - cron: "0 12 * * 1"
  # Permite correrlo manualmente desde la pestaña "Actions" en GitHub
  workflow_dispatch:

jobs:
  scrape-minorista:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Correr scraper minorista
        env:
          PANEL_API_URL: ${{ secrets.PANEL_API_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        working-directory: scraper
        run: python mekk_minorista_scraper.py

      - name: Subir JSON generado (para debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalogo-mekk-minorista
          path: scraper/mekk_output/catalogo_mekk_minorista.json
          retention-days: 14
          if-no-files-found: warn

  scrape-mayorista:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Correr scraper mayorista
        env:
          MEKK_COOKIES_JSON: ${{ secrets.MEKK_COOKIES_JSON }}
          PANEL_API_URL: ${{ secrets.PANEL_API_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        working-directory: scraper
        run: python mekk_mayorista_scraper.py

      - name: Subir JSON generado (para debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalogo-mekk-mayorista
          path: scraper/mekk_output/catalogo_mekk_mayorista.json
          retention-days: 14
          if-no-files-found: warn

